name: Release & Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras
      - run: uv run pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    # Skip if the push was the version-bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v5

      - name: Bump patch version
        id: bump
        run: |
          # Extract current version from pyproject.toml
          current=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "current=$current"

          # Increment patch: 0.1.0 -> 0.1.1
          IFS='.' read -r major minor patch <<< "$current"
          new_version="${major}.${minor}.$((patch + 1))"
          echo "new_version=$new_version"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

          # Update pyproject.toml
          sed -i "s/^version = \"$current\"/version = \"$new_version\"/" pyproject.toml

          # Update __init__.py
          sed -i "s/__version__ = \"$current\"/__version__ = \"$new_version\"/" src/alphascope/__init__.py

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/alphascope/__init__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

      - name: Build & publish
        run: |
          uv build
          uv publish --trusted-publishing always
